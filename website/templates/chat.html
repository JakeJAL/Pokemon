{% extends "base.html" %}

{% block title %}Chat - PokéPrice{% endblock %}

{% block extra_css %}
<style>
    /* 1. Making the container Gigantamax-sized! */
    .chatbot-container {
        background: white;
        border-radius: 20px;
        padding: 2rem;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        max-width: 1000px; /* Much wider! */
        margin: 2rem auto;
        height: 750px; /* Much taller! */
        display: flex;
        flex-direction: column;
    }
    
    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem;
        background: #f8f9fa;
        border-radius: 12px;
        margin-bottom: 1rem;
    }
    
    .message {
        margin-bottom: 1rem;
        display: flex;
        gap: 0.5rem;
    }
    
    .message.user {
        justify-content: flex-end;
    }
    
    .message-content {
        padding: 1rem;
        border-radius: 12px;
        line-height: 1.5;
    }
    
    /* Bot bubble is wider to fit the card grid */
    .message.bot .message-content {
        max-width: 90%;
        background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
        color: #eab308;
        border: 2px solid #eab308;
    }
    
    .message.user .message-content {
        max-width: 70%;
        background: #eab308;
        color: #0f172a;
    }

    /* 2. The Grid System for the cards */
    .card-result-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 12px;
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px solid rgba(255,255,255,0.3);
    }
    
    .card-item {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(234, 179, 8, 0.3);
        border-radius: 8px;
        padding: 12px;
        font-size: 0.9rem;
        transition: transform 0.2s;
    }

    .card-item:hover {
        background: rgba(255,255,255,0.2);
        transform: scale(1.02);
    }
    
    .chat-input-container {
        display: flex;
        gap: 1rem;
    }
    
    .chat-input {
        flex: 1;
        padding: 1rem;
        border: 2px solid #eab308;
        border-radius: 12px;
        font-size: 1rem;
    }
    
    .send-btn {
        padding: 1rem 2rem;
        background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%);
        color: #0f172a;
        border: none;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
    }
</style>
{% endblock %}

{% block content %}
<div class="chatbot-container">
    <h2 style="margin-bottom: 1rem; color: #333;">
        <i class="fas fa-robot"></i> Pokemon TCG Assistant
    </h2>
    
    <div class="chat-messages" id="chatMessages">
        <div class="message bot">
            <div class="message-content">
                Hi! I'm Tinka! ✨ Ask me anything about cards or prices, and I'll find the best deals for you!
            </div>
        </div>
    </div>
    
    <div class="chat-input-container">
        <input type="text" class="chat-input" id="chatInput" placeholder="Try searching 'Pikachu'..." onkeypress="handleChatKeypress(event)">
        <button class="send-btn" onclick="sendMessage()">
            <i class="fas fa-paper-plane"></i> Send
        </button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    function handleChatKeypress(event) {
        if (event.key === 'Enter') sendMessage();
    }
    
    function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message) return;
            
            // --- NEW: Grab the collection from localStorage ---
            const myVault = JSON.parse(localStorage.getItem('myCollection') || '{}');
            
            const messagesContainer = document.getElementById('chatMessages');
            
            // Add user message to UI
            const userMsg = document.createElement('div');
            userMsg.className = 'message user';
            userMsg.innerHTML = `<div class="message-content">${message}</div>`;
            messagesContainer.appendChild(userMsg);
            input.value = '';
            
            // Show typing indicator
            const typingMsg = document.createElement('div');
            typingMsg.className = 'message bot';
            typingMsg.innerHTML = `<div class="message-content">Checking my Pokédex...</div>`;
            messagesContainer.appendChild(typingMsg);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            // --- UPDATED: Send the message AND the collection ---
            fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: message, 
                    top_n: 6,
                    collection: myVault  // <--- This is the secret sauce!
                })
            })
            .then(response => response.json())
            .then(data => {
                messagesContainer.removeChild(typingMsg);
                
                const botMsg = document.createElement('div');
                botMsg.className = 'message bot';
                
                let content = `<div class="message-content">${data.response}`;
                
                if (data.results && data.results.length > 0) {
                    content += '<div class="card-result-grid">';
                    data.results.forEach(card => {
                        content += `
                            <div class="card-item">
                                <strong style="display:block; margin-bottom:5px;">${card.title}</strong>
                                <span style="color: #fbbf24; font-weight: bold; font-size: 1.1rem;">£${card.price}</span><br>
                                <small style="opacity: 0.8;">Source: ${card.source}</small><br>
                                <a href="${card.url}" target="_blank" style="color: #fbbf24; text-decoration: underline; display:inline-block; margin-top:8px;">View Deal</a>
                            </div>
                        `;
                    });
                    content += '</div>';
                }
                
                content += '</div>';
                botMsg.innerHTML = content;
                messagesContainer.appendChild(botMsg);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            });
        }
</script>
{% endblock %}
