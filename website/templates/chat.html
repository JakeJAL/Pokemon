{% extends "base.html" %}

{% block title %}Chat - PokéPrice{% endblock %}

{% block extra_css %}
<style>
    .chatbot-container {
        background: white;
        border-radius: 20px;
        padding: 2rem;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        height: 600px;
        display: flex;
        flex-direction: column;
    }
    
    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
        background: #f8f9fa;
        border-radius: 12px;
        margin-bottom: 1rem;
    }
    
    .message {
        margin-bottom: 1rem;
        display: flex;
        gap: 0.5rem;
    }
    
    .message.user {
        justify-content: flex-end;
    }
    
    .message-content {
        max-width: 70%;
        padding: 1rem;
        border-radius: 12px;
    }
    
    .message.bot .message-content {
        background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
        color: #eab308;
        border: 2px solid #eab308;
    }
    
    .message.user .message-content {
        background: #eab308;
        color: #0f172a;
    }
    
    .chat-input-container {
        display: flex;
        gap: 1rem;
    }
    
    .chat-input {
        flex: 1;
        padding: 1rem;
        border: 2px solid #eab308;
        border-radius: 12px;
        font-size: 1rem;
    }
    
    .chat-input:focus {
        outline: none;
        border-color: #fbbf24;
    }
    
    .send-btn {
        padding: 1rem 2rem;
        background: linear-gradient(135deg, #eab308 0%, #ca8a04 100%);
        color: #0f172a;
        border: none;
        border-radius: 12px;
        font-weight: 600;
        cursor: pointer;
    }
</style>
{% endblock %}

{% block content %}
<div class="chatbot-container">
    <h2 style="margin-bottom: 1rem; color: #333;">
        <i class="fas fa-robot"></i> Pokemon TCG Assistant
    </h2>
    
    <div class="chat-messages" id="chatMessages">
        <div class="message bot">
            <div class="message-content">
                Hi! I'm your Pokemon TCG assistant. Ask me anything about cards, sets, prices, or game rules!
            </div>
        </div>
    </div>
    
    <div class="chat-input-container">
        <input type="text" class="chat-input" id="chatInput" placeholder="Ask me anything..." onkeypress="handleChatKeypress(event)">
        <button class="send-btn" onclick="sendMessage()">
            <i class="fas fa-paper-plane"></i> Send
        </button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Chatbot
    function handleChatKeypress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }
    
    function sendMessage() {
        const input = document.getElementById('chatInput');
        const message = input.value.trim();
        
        if (!message) return;
        
        const messagesContainer = document.getElementById('chatMessages');
        
        // Add user message
        const userMsg = document.createElement('div');
        userMsg.className = 'message user';
        userMsg.innerHTML = `<div class="message-content">${message}</div>`;
        messagesContainer.appendChild(userMsg);
        
        input.value = '';
        
        // Show typing indicator
        const typingMsg = document.createElement('div');
        typingMsg.className = 'message bot typing';
        typingMsg.innerHTML = `<div class="message-content">Searching...</div>`;
        messagesContainer.appendChild(typingMsg);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
        
        // Send to chatbot API
        fetch('/api/chat', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                message: message,
                top_n: 5
            })
        })
        .then(response => response.json())
        .then(data => {
            // Remove typing indicator
            messagesContainer.removeChild(typingMsg);
            
            if (data.error) {
                const errorMsg = document.createElement('div');
                errorMsg.className = 'message bot';
                errorMsg.innerHTML = `<div class="message-content">❌ ${data.error}</div>`;
                messagesContainer.appendChild(errorMsg);
            } else {
                // Add bot response
                const botMsg = document.createElement('div');
                botMsg.className = 'message bot';
                
                let content = `<div class="message-content">${data.response}`;
                
                // Add results if available
                if (data.results && data.results.length > 0) {
                    content += '<div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.3);">';
                    data.results.forEach(card => {
                        content += `
                            <div style="margin-bottom: 0.5rem; padding: 0.5rem; background: rgba(255,255,255,0.1); border-radius: 8px;">
                                <strong>${card.title}</strong><br>
                                <span style="color: #fbbf24;">£${card.price}</span> - ${card.source}<br>
                                <a href="${card.url}" target="_blank" style="color: #fbbf24; text-decoration: underline;">View Product</a>
                            </div>
                        `;
                    });
                    content += '</div>';
                }
                
                content += '</div>';
                botMsg.innerHTML = content;
                messagesContainer.appendChild(botMsg);
            }
            
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        })
        .catch(error => {
            // Remove typing indicator
            messagesContainer.removeChild(typingMsg);
            
            const errorMsg = document.createElement('div');
            errorMsg.className = 'message bot';
            errorMsg.innerHTML = `<div class="message-content">❌ Sorry, something went wrong. Please try again.</div>`;
            messagesContainer.appendChild(errorMsg);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        });
    }
</script>
{% endblock %}
