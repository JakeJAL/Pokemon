<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PokéPrice - Your Pokemon TCG Companion{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, rgba(20, 30, 48, 0.85) 0%, rgba(30, 58, 138, 0.85) 50%, rgba(15, 23, 42, 0.85) 100%),
                        url('https://images.unsplash.com/photo-1613771404721-1f92d799e49f?w=1920&q=80') center/cover fixed;
            min-height: 100vh;
        }
        
        /* Navigation */
        nav {
            background: linear-gradient(135deg, rgba(30, 58, 138, 0.95) 0%, rgba(15, 23, 42, 0.95) 100%);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            box-shadow: 0 2px 20px rgba(234, 179, 8, 0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 3px solid #eab308;
        }
        
        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(135deg, #eab308 0%, #fbbf24 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }
        
        .nav-links a {
            text-decoration: none;
            color: #eab308;
            font-weight: 600;
            transition: color 0.3s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .nav-links a:hover {
            color: #fbbf24;
        }
        
        .nav-links a.active {
            color: #fde047;
        }
        
        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        
        /* Common Styles */
        .section {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .loading {
            text-align: center;
            padding: 2rem;
            color: #eab308;
        }
        
        .loading i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                gap: 1rem;
            }
            
            .container {
                padding: 0 1rem;
            }
        }
    </style>
    {% block extra_css %}
    {% endblock %}
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-bolt"></i> PokéPrice
            </div>
            <ul class="nav-links">
                <li><a href="/" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="/price" class="nav-link {% if request.endpoint == 'price' %}active{% endif %}"><i class="fas fa-tags"></i> Price Compare</a></li>
                <li><a href="/search" class="nav-link {% if request.endpoint == 'search' %}active{% endif %}"><i class="fas fa-search"></i> Card Search</a></li>
                <li><a href="/chat" class="nav-link {% if request.endpoint == 'chat' %}active{% endif %}"><i class="fas fa-comments"></i> Chat</a></li>
                <li><a href="/collection" class="nav-link"><i class="fas fa-box-open"></i> My Vault</a></li>
                <li><a href="/scan" class="nav-link {% if request.endpoint == 'scan_page' %}active{% endif %}"><i class="fas fa-camera"></i> Scanner</a></li>
            </ul>
        </div>
    </nav>
    
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
    
    {% block scripts %}
    {% endblock %}
</body>
</html>
